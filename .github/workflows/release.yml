name: Release

# Fires when a version tag is pushed, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the GitHub Release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      # The Linux ARM64 target needs a cross linker on the x86 runner.
      - name: Install cross linker (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Package: tar.gz on Unix, zip on Windows. Asset name carries the target.
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          bin=target/${{ matrix.target }}/release/andri
          name=andri-${{ github.ref_name }}-${{ matrix.target }}
          tar -czf "$name.tar.gz" -C "$(dirname "$bin")" andri
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          bin=target/${{ matrix.target }}/release/andri.exe
          name=andri-${{ github.ref_name }}-${{ matrix.target }}
          7z a "$name.zip" "$bin"
          certutil -hashfile "$name.zip" SHA256 > "$name.zip.sha256"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            andri-*.tar.gz
            andri-*.tar.gz.sha256
            andri-*.zip
            andri-*.zip.sha256
          generate_release_notes: true

  # Publish to crates.io once, after all platform binaries build successfully.
  # Requires a CARGO_REGISTRY_TOKEN repo secret (Settings → Secrets → Actions),
  # generated at https://crates.io/settings/tokens with publish-update scope.
  publish:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      # Guard: the tag (v0.1.0 → 0.1.0) must match the Cargo.toml version, so a
      # mistagged release can't publish the wrong version to crates.io.
      - name: Verify tag matches Cargo.toml version
        run: |
          tag_ver="${GITHUB_REF_NAME#v}"
          crate_ver="$(cargo metadata --no-deps --format-version 1 \
            | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)"
          echo "tag=$tag_ver crate=$crate_ver"
          if [ "$tag_ver" != "$crate_ver" ]; then
            echo "::error::tag v$tag_ver != Cargo.toml version $crate_ver"
            exit 1
          fi
      - name: Publish
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
